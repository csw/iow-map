<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IOW Label Identifier</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#ddd;font-family:system-ui,sans-serif;overflow:hidden;height:100vh}
#app{display:flex;flex-direction:column;height:100vh}
#hdr{padding:8px 16px;background:#1a1a2e;border-bottom:1px solid #333;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
#hdr select{background:#222;color:#ddd;border:1px solid #555;border-radius:4px;padding:4px 8px;font-size:14px}
#hdr label{font-size:13px;color:#aaa;display:flex;align-items:center;gap:4px}
#hdr input[type=checkbox]{accent-color:#ffd700}
#hdr .info{margin-left:auto;font-size:12px;color:#888}
#canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab}
#canvas-wrap:active{cursor:grabbing}
canvas{position:absolute;top:0;left:0}
#tooltip{position:fixed;background:rgba(0,0,0,.9);color:#ffd700;padding:6px 12px;border-radius:6px;font-size:14px;pointer-events:none;display:none;z-index:10;border:1px solid #ffd700;white-space:pre-line}
#labels-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,20,.95);border-top:1px solid #555;max-height:35vh;overflow-y:auto;padding:12px 16px;display:none;z-index:5}
#labels-panel h3{color:#ffd700;font-size:14px;margin-bottom:8px}
#labels-panel .lbl-row{display:flex;gap:8px;align-items:center;margin-bottom:4px;font-size:13px}
#labels-panel .lbl-row .idx{color:#0ff;min-width:40px}
#labels-panel .lbl-row input{flex:1;background:#222;border:1px solid #444;border-radius:4px;color:#ddd;padding:3px 8px;font-size:13px}
#labels-panel button{background:#ffd700;color:#000;border:none;border-radius:4px;padding:6px 14px;font-size:13px;cursor:pointer;margin-top:8px}
#labels-panel pre{background:#1a1a1a;padding:8px;border-radius:4px;font-size:12px;color:#2dd4a8;margin-top:8px;white-space:pre-wrap;max-height:120px;overflow:auto}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <select id="mapsel"></select>
    <label><input type="checkbox" id="showNums" checked> Numbers</label>
    <label><input type="checkbox" id="showEdges" checked> Edges</label>
    <label><input type="checkbox" id="showDeg1" checked> Highlight deg-1</label>
    <label style="color:#ffd700;cursor:pointer" onclick="toggleLabels()">✎ Labels</label>
    <span class="info" id="info"></span>
  </div>
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
  </div>
  <div id="tooltip"></div>
  <div id="labels-panel">
    <h3>Label Mapping (vertex → label text)</h3>
    <div id="lbl-entries"></div>
    <button onclick="exportLabels()">Export LBL JSON</button>
    <pre id="lbl-output" style="display:none"></pre>
  </div>
</div>

const MAPORDER=["central_reef","east_reef","the_bloom_main","dusk_slopes","brine_pool",
  "the_anomaly_lower_level","the_anomaly_upper_level",
  "the_bloom_site_2_level_1","the_bloom_site_2_level_2","the_bloom_site_2_level_3","the_bloom_site_2_level_4"];

const sel=document.getElementById("mapsel");
MAPORDER.forEach(k=>{const o=document.createElement("option");o.value=k;o.textContent=MAPS[k].name;sel.appendChild(o);});

let curKey="east_reef", M=MAPS[curKey];
let img=new Image(), imgLoaded=false;
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
const wrap=document.getElementById("canvas-wrap");
let W=0,H=0, ox=0,oy=0, scale=1;
let showNums=true, showEdges=true, showDeg1=true;

document.getElementById("showNums").onchange=e=>{showNums=e.target.checked;draw();};
document.getElementById("showEdges").onchange=e=>{showEdges=e.target.checked;draw();};
document.getElementById("showDeg1").onchange=e=>{showDeg1=e.target.checked;draw();};

function loadMap(key){
  curKey=key; M=MAPS[key]; imgLoaded=false;
  img=new Image(); img.crossOrigin="anonymous";
  img.onload=()=>{imgLoaded=true; fitView(); draw();};
  img.onerror=()=>{imgLoaded=false; draw();};
  img.src=M.img;
  document.getElementById("info").textContent=`${M.name}: ${M.V.length} vertices, ${M.E.length} edges`;
  buildLabelEntries();
  draw();
}

function fitView(){
  W=wrap.clientWidth; H=wrap.clientHeight;
  cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio;
  cv.style.width=W+"px"; cv.style.height=H+"px";
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  const sx=W/M.IW, sy=H/M.IH;
  scale=Math.min(sx,sy)*0.95;
  ox=(W-M.IW*scale)/2; oy=(H-M.IH*scale)/2;
}

function draw(){
  W=wrap.clientWidth; H=wrap.clientHeight;
  if(cv.width!==W*devicePixelRatio||cv.height!==H*devicePixelRatio){
    cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio;
    cv.style.width=W+"px"; cv.style.height=H+"px";
  }
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(ox,oy); ctx.scale(scale,scale);

  if(imgLoaded) ctx.drawImage(img,0,0,M.IW,M.IH);
  else{ctx.fillStyle="#222";ctx.fillRect(0,0,M.IW,M.IH);
    ctx.fillStyle="#666";ctx.font="48px sans-serif";ctx.textAlign="center";
    ctx.fillText("Loading "+M.name+"...",M.IW/2,M.IH/2);}

  // Compute degree
  const deg=new Array(M.V.length).fill(0);
  M.E.forEach(([a,b])=>{deg[a]++;deg[b]++;});

  // Edges
  if(showEdges){
    ctx.strokeStyle="rgba(0,255,255,0.5)";ctx.lineWidth=6/scale;
    M.E.forEach(([a,b])=>{
      const ax=M.V[a][0]*M.IW,ay=M.V[a][1]*M.IH;
      const bx=M.V[b][0]*M.IW,by=M.V[b][1]*M.IH;
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();
    });
  }

  // Nodes
  const r=Math.max(18, 28/scale*2);
  const fontSize=Math.max(16, 30/scale*2);
  M.V.forEach(([x,y],i)=>{
    const px=x*M.IW, py=y*M.IH;
    const isDeg1=deg[i]===1;
    ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2);
    if(showDeg1&&isDeg1){ctx.fillStyle="rgba(255,100,100,0.8)";ctx.strokeStyle="#ff4444";}
    else{ctx.fillStyle="rgba(0,255,255,0.6)";ctx.strokeStyle="#00ffff";}
    ctx.lineWidth=3/scale; ctx.fill(); ctx.stroke();

    if(showNums){
      ctx.fillStyle="#000";ctx.font=`bold ${fontSize}px monospace`;ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(i,px,py);
      ctx.fillStyle="#fff";ctx.font=`${fontSize-2}px monospace`;
      ctx.fillText(i,px-1,py-1);
    }
  });

  ctx.restore();
}

// Pan & zoom
let drag=null;
wrap.addEventListener("mousedown",e=>{drag={x:e.clientX,y:e.clientY,ox,oy};});
window.addEventListener("mousemove",e=>{
  if(!drag)return;
  ox=drag.ox+(e.clientX-drag.x); oy=drag.oy+(e.clientY-drag.y); draw();
});
window.addEventListener("mouseup",()=>{drag=null;});
wrap.addEventListener("wheel",e=>{
  e.preventDefault();
  const rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const f=e.deltaY>0?0.92:1.08;
  const ns=scale*f;
  ox=mx-(mx-ox)*(ns/scale); oy=my-(my-oy)*(ns/scale);
  scale=ns; draw();
},{passive:false});
// Touch
let touch0=null,touchDist=null;
wrap.addEventListener("touchstart",e=>{
  e.preventDefault();
  if(e.touches.length===1){
    drag={x:e.touches[0].clientX,y:e.touches[0].clientY,ox,oy};
  }else if(e.touches.length===2){
    touchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    touch0={scale,ox,oy,
      mx:(e.touches[0].clientX+e.touches[1].clientX)/2,
      my:(e.touches[0].clientY+e.touches[1].clientY)/2};
  }
},{passive:false});
wrap.addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){
    ox=drag.ox+(e.touches[0].clientX-drag.x);
    oy=drag.oy+(e.touches[0].clientY-drag.y); draw();
  }else if(e.touches.length===2&&touch0){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=d/touchDist;
    const ns=touch0.scale*f;
    const rect=wrap.getBoundingClientRect();
    const mx=touch0.mx-rect.left, my=touch0.my-rect.top;
    ox=mx-(mx-touch0.ox)*(ns/touch0.scale);
    oy=my-(my-touch0.oy)*(ns/touch0.scale);
    scale=ns; draw();
  }
},{passive:false});
wrap.addEventListener("touchend",e=>{drag=null;touchDist=null;touch0=null;});

// Tooltip on hover
wrap.addEventListener("mousemove",e=>{
  if(drag)return;
  const rect=wrap.getBoundingClientRect();
  const mx=(e.clientX-rect.left-ox)/scale, my=(e.clientY-rect.top-oy)/scale;
  let best=-1,bd=40/scale;
  M.V.forEach(([x,y],i)=>{
    const d=Math.hypot(x*M.IW-mx,y*M.IH-my);
    if(d<bd){bd=d;best=i;}
  });
  const tt=document.getElementById("tooltip");
  if(best>=0){
    const deg_arr=new Array(M.V.length).fill(0);
    M.E.forEach(([a,b])=>{deg_arr[a]++;deg_arr[b]++;});
    const nb=M.E.filter(([a,b])=>a===best||b===best).map(([a,b])=>a===best?b:a);
    tt.innerHTML=`<b>Vertex ${best}</b>\ndeg=${deg_arr[best]}, neighbors=[${nb.join(",")}]\npx=(${Math.round(M.V[best][0]*M.IW)}, ${Math.round(M.V[best][1]*M.IH)})`;
    tt.style.display="block";tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY+14)+"px";
  }else tt.style.display="none";
});

// Label mapping UI
let labelsPanelOpen=false;
function toggleLabels(){
  labelsPanelOpen=!labelsPanelOpen;
  document.getElementById("labels-panel").style.display=labelsPanelOpen?"block":"none";
}
function buildLabelEntries(){
  const c=document.getElementById("lbl-entries"); c.innerHTML="";
  // Show all degree-1 nodes first, then a few key ones
  const deg=new Array(M.V.length).fill(0);
  M.E.forEach(([a,b])=>{deg[a]++;deg[b]++;});
  // Build rows for ALL vertices (deg-1 first, then rest)
  const order=[...M.V.keys()].sort((a,b)=>deg[a]-deg[b]);
  order.forEach(i=>{
    const d=document.createElement("div"); d.className="lbl-row";
    const isDeg1=deg[i]===1;
    d.innerHTML=`<span class="idx">${isDeg1?"🔴":"⚪"} ${i}</span><input id="lbl_${curKey}_${i}" placeholder="${isDeg1?"exit/entry?":""}">`;
    c.appendChild(d);
  });
}
function exportLabels(){
  const lbl={};
  M.V.forEach((_,i)=>{
    const inp=document.getElementById(`lbl_${curKey}_${i}`);
    if(inp&&inp.value.trim()) lbl[i]=inp.value.trim();
  });
  const out=document.getElementById("lbl-output");
  out.style.display="block";
  out.textContent=`LBL:${JSON.stringify(lbl)}`;
}

sel.value=curKey; sel.onchange=()=>loadMap(sel.value);
window.addEventListener("resize",()=>{fitView();draw();});
loadMap(curKey);
</script>
